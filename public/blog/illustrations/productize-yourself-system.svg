    <text x="191" y="386" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">taste</text>
    <text x="191" y="412" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">judgment</text>
  </g>
  <g filter="url(#shadow)">
