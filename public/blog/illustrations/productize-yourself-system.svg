    <text x="455" y="352" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">Clear Offer</text>
    <text x="455" y="386" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">outcome</text>
    <text x="455" y="412" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">mechanism</text>
  </g>
  <g filter="url(#shadow)">
