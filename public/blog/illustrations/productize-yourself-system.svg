    <text x="719" y="352" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">Proof Layer</text>
    <text x="719" y="386" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">case studies</text>
    <text x="719" y="412" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">metrics</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="888" y="300" width="190" height="150" rx="22" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.42"/>
    <text x="983" y="352" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">AI Systems</text>
    <text x="983" y="386" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">capture</text>
    <text x="983" y="412" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">follow-up</text>
  </g>

