  <text x="96" y="172" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#f8fafc">Productize Yourself</text>
  <text x="96" y="216" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#cbd5e1">Turn founder authenticity into a repeatable offer, proof, and AI-enabled delivery.</text>

