<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Career clarity operating loop</title>
  <desc id="desc">A four-step loop for turning career uncertainty into signals, experiments, proof, and market response.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="58%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1025" cy="115" r="210" fill="#38bdf8" opacity="0.08"/>
  <circle cx="162" cy="526" r="210" fill="#34d399" opacity="0.08"/>
  <rect x="48" y="48" width="1104" height="534" rx="28" fill="none" stroke="#94a3b8" stroke-opacity="0.16"/>

  <text x="96" y="118" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#38bdf8">FUTURE-READY CAREER SYSTEM</text>
  <text x="96" y="172" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="800" fill="#f8fafc">Career Clarity Loop</text>
  <text x="96" y="216" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#cbd5e1">Stop spiraling. Build small experiments that create visible proof.</text>

  <g transform="translate(600 374)">
    <circle r="158" fill="#0f172a" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
    <circle r="102" fill="#020617" stroke="#38bdf8" stroke-opacity="0.35"/>
    <text y="-12" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="800" fill="#f8fafc" text-anchor="middle">Better next</text>
    <text y="20" font-family="Inter, system-ui, sans-serif" font-size="23" font-weight="800" fill="#f8fafc" text-anchor="middle">decision</text>
    <text y="54" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">made from evidence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="292" width="210" height="104" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.42"/>
    <text x="285" y="333" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">1. Signals</text>
    <text x="285" y="364" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">energy + market pain</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="495" y="252" width="210" height="104" rx="20" fill="#0f172a" stroke="#34d399" stroke-opacity="0.42"/>
    <text x="600" y="293" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">2. Experiment</text>
    <text x="600" y="324" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">14-day build</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="810" y="292" width="210" height="104" rx="20" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.42"/>
    <text x="915" y="333" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">3. Proof</text>
    <text x="915" y="364" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">portfolio artifact</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="495" y="444" width="210" height="104" rx="20" fill="#0f172a" stroke="#34d399" stroke-opacity="0.42"/>
    <text x="600" y="485" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#f8fafc" text-anchor="middle">4. Response</text>
    <text x="600" y="516" font-family="Inter, system-ui, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">ask, share, pay, invite</text>
  </g>

  <path d="M390 344 C430 300 454 292 492 304" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M705 304 C758 292 786 302 810 344" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M884 396 C838 458 772 496 707 496" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M493 496 C418 490 356 452 316 397" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M476 292 L497 304 L474 314" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M793 331 L811 346 L787 351" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M725 487 L705 496 L725 508" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M329 416 L315 396 L340 398" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="600" y="574" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#dbeafe" text-anchor="middle">Do not make a life decision from a mood. Make it from a pattern of evidence.</text>
</svg>
